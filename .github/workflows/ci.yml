name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  lint-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      working-directory: backend
      run: |
        python -m venv .venv
        . .venv/Scripts/activate
        pip install -r requirements.txt

    - name: Run tests
      working-directory: backend
      run: |
        . .venv/Scripts/activate
        pytest
